<svg xmlns="http://www.w3.org/2000/svg" width="200" height="160" viewBox="0 0 200 160">
  <defs>
    <linearGradient id="doorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#be185d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="160" fill="url(#doorGradient)"/>
  
  <!-- Door frame -->
  <rect x="45" y="20" width="110" height="120" fill="#8b7355" stroke="#fff" stroke-width="2"/>
  
  <!-- Door -->
  <rect x="50" y="25" width="50" height="110" fill="#a0826d" stroke="#654321" stroke-width="1"/>
  
  <!-- Door handle -->
  <circle cx="95" cy="80" r="4" fill="#fbbf24"/>
  
  <!-- Door lines -->
  <line x1="50" y1="25" x2="100" y2="135" stroke="#654321" stroke-width="1" opacity="0.3"/>
  
  <!-- Smart lock indicator -->
  <rect x="120" y="60" width="30" height="40" fill="#374151" rx="4"/>
  <circle cx="135" cy="70" r="3" fill="#10b981"/>
  <circle cx="135" cy="80" r="3" fill="#10b981"/>
  <circle cx="135" cy="90" r="3" fill="#10b981"/>
  
  <!-- Lock status light -->
  <circle cx="135" cy="75" r="6" fill="#10b981" opacity="0.3"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="200" height="160" viewBox="0 0 200 160">
  <defs>
    <linearGradient id="boardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="160" fill="url(#boardGradient)"/>
  
  <!-- Board -->
  <rect x="40" y="30" width="120" height="100" fill="#2d3748" stroke="#fff" stroke-width="2" rx="4"/>
  
  <!-- Dice pieces -->
  <g>
    <!-- Dice 1 -->
    <rect x="55" y="45" width="20" height="20" fill="#ef4444" stroke="#fff" stroke-width="1"/>
    <circle cx="60" cy="50" r="2" fill="#fff"/>
    <circle cx="65" cy="55" r="2" fill="#fff"/>
    
    <!-- Dice 2 -->
    <rect x="80" y="50" width="20" height="20" fill="#3b82f6" stroke="#fff" stroke-width="1"/>
    <circle cx="85" cy="55" r="2" fill="#fff"/>
    <circle cx="90" cy="60" r="2" fill="#fff"/>
    
    <!-- Dice 3 -->
    <rect x="105" y="45" width="20" height="20" fill="#10b981" stroke="#fff" stroke-width="1"/>
    <circle cx="110" cy="50" r="2" fill="#fff"/>
    <circle cx="115" cy="55" r="2" fill="#fff"/>
  </g>
  
  <!-- Path line -->
  <line x1="60" y1="80" x2="140" y2="80" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5"/>
</svg>

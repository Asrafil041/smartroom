<svg xmlns="http://www.w3.org/2000/svg" width="200" height="160" viewBox="0 0 200 160">
  <defs>
    <linearGradient id="labNetworkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="160" fill="url(#labNetworkGrad)"/>
  
  <!-- Network nodes -->
  <!-- Central hub -->
  <circle cx="100" cy="80" r="15" fill="#fff" stroke="#fbbf24" stroke-width="2"/>
  <text x="100" y="86" font-size="16" fill="#8b5cf6" text-anchor="middle" font-weight="bold">🔗</text>
  
  <!-- Nodes -->
  <circle cx="50" cy="50" r="10" fill="#fbbf24" stroke="#fff" stroke-width="1"/>
  <circle cx="150" cy="50" r="10" fill="#fbbf24" stroke="#fff" stroke-width="1"/>
  <circle cx="50" cy="110" r="10" fill="#10b981" stroke="#fff" stroke-width="1"/>
  <circle cx="150" cy="110" r="10" fill="#10b981" stroke="#fff" stroke-width="1"/>
  
  <!-- Wireless signals -->
  <line x1="60" y1="55" x2="87" y2="72" stroke="#fff" stroke-width="2" opacity="0.8"/>
  <line x1="140" y1="55" x2="113" y2="72" stroke="#fff" stroke-width="2" opacity="0.8"/>
  <line x1="60" y1="105" x2="87" y2="88" stroke="#fff" stroke-width="2" opacity="0.8"/>
  <line x1="140" y1="105" x2="113" y2="88" stroke="#fff" stroke-width="2" opacity="0.8"/>
  
  <!-- Signal waves -->
  <circle cx="100" cy="80" r="25" fill="none" stroke="#fff" stroke-width="1" opacity="0.4"/>
  <circle cx="100" cy="80" r="35" fill="none" stroke="#fff" stroke-width="1" opacity="0.2"/>
</svg>

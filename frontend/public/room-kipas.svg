<svg xmlns="http://www.w3.org/2000/svg" width="200" height="160" viewBox="0 0 200 160">
  <defs>
    <linearGradient id="fanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="160" fill="url(#fanGradient)"/>
  
  <!-- Fan circle -->
  <circle cx="100" cy="80" r="45" fill="#fbbf24" opacity="0.8"/>
  
  <!-- Fan blades -->
  <g transform="translate(100, 80)">
    <rect x="-8" y="-30" width="16" height="25" fill="#fff" opacity="0.9" rx="2"/>
    <rect x="-8" y="-30" width="16" height="25" fill="#fff" opacity="0.9" rx="2" transform="rotate(120)"/>
    <rect x="-8" y="-30" width="16" height="25" fill="#fff" opacity="0.9" rx="2" transform="rotate(240)"/>
  </g>
  
  <!-- Center circle -->
  <circle cx="100" cy="80" r="8" fill="#374151"/>
</svg>

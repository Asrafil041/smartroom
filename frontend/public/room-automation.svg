<svg xmlns="http://www.w3.org/2000/svg" width="200" height="160" viewBox="0 0 200 160">
  <defs>
    <linearGradient id="roomAutoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="160" fill="url(#roomAutoGrad)"/>
  
  <!-- Room walls -->
  <rect x="20" y="20" width="160" height="120" fill="none" stroke="#fff" stroke-width="2" rx="4"/>
  
  <!-- Light -->
  <circle cx="100" cy="35" r="8" fill="#fbbf24" stroke="#f59e0b" stroke-width="1"/>
  <line x1="100" y1="22" x2="100" y2="10" stroke="#fbbf24" stroke-width="1" opacity="0.5"/>
  
  <!-- AC Unit -->
  <rect x="30" y="50" width="25" height="18" fill="#1e293b" stroke="#fff" stroke-width="1" rx="2"/>
  <rect x="33" y="53" width="19" height="12" fill="#10b981" opacity="0.3"/>
  
  <!-- Door -->
  <rect x="155" y="75" width="18" height="40" fill="#8b7355" stroke="#fff" stroke-width="1" rx="2"/>
  <circle cx="170" cy="95" r="2" fill="#fbbf24"/>
  
  <!-- Automation panel -->
  <rect x="45" y="90" width="50" height="35" fill="#374151" stroke="#fff" stroke-width="2" rx="3"/>
  
  <!-- Control switches -->
  <rect x="55" y="100" width="10" height="6" fill="#10b981" rx="1"/>
  <rect x="70" y="100" width="10" height="6" fill="#fbbf24" rx="1"/>
  
  <rect x="55" y="112" width="10" height="6" fill="#fbbf24" rx="1"/>
  <rect x="70" y="112" width="10" height="6" fill="#ef4444" rx="1"/>
  
  <!-- Status indicators -->
  <circle cx="120" cy="115" r="4" fill="#10b981"/>
  <circle cx="130" cy="115" r="4" fill="#10b981"/>
  <circle cx="140" cy="115" r="4" fill="#fbbf24"/>
</svg>

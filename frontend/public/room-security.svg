<svg xmlns="http://www.w3.org/2000/svg" width="200" height="160" viewBox="0 0 200 160">
  <defs>
    <linearGradient id="roomSecurityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="160" fill="url(#roomSecurityGrad)"/>
  
  <!-- Security control panel -->
  <rect x="20" y="30" width="160" height="100" fill="#1e293b" stroke="#fff" stroke-width="2" rx="4"/>
  
  <!-- Status display -->
  <rect x="40" y="45" width="120" height="25" fill="#374151" rx="2"/>
  <text x="100" y="65" font-size="14" fill="#10b981" text-anchor="middle" font-weight="bold">🔒 SECURED</text>
  
  <!-- Camera icons -->
  <circle cx="55" cy="90" r="6" fill="#fbbf24" stroke="#fff" stroke-width="1"/>
  <line x1="55" y1="97" x2="55" y2="110" stroke="#fff" stroke-width="1" opacity="0.6"/>
  
  <circle cx="100" cy="90" r="6" fill="#fbbf24" stroke="#fff" stroke-width="1"/>
  <line x1="100" y1="97" x2="100" y2="110" stroke="#fff" stroke-width="1" opacity="0.6"/>
  
  <circle cx="145" cy="90" r="6" fill="#fbbf24" stroke="#fff" stroke-width="1"/>
  <line x1="145" y1="97" x2="145" y2="110" stroke="#fff" stroke-width="1" opacity="0.6"/>
  
  <!-- Motion sensors -->
  <rect x="45" y="115" width="8" height="8" fill="#10b981" rx="1"/>
  <rect x="95" y="115" width="8" height="8" fill="#10b981" rx="1"/>
  <rect x="145" y="115" width="8" height="8" fill="#10b981" rx="1"/>
  
  <!-- Alarm indicator -->
  <circle cx="170" cy="55" r="8" fill="#ef4444" stroke="#fff" stroke-width="1"/>
  <text x="170" y="60" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">!</text>
  
  <!-- Lock symbol -->
  <rect x="70" y="125" width="60" height="25" fill="none" stroke="#fff" stroke-width="1" rx="3"/>
  <circle cx="100" cy="137" r="4" fill="none" stroke="#fff" stroke-width="1"/>
  <rect x="97" y="142" width="6" height="5" fill="#10b981" rx="1"/>
</svg>

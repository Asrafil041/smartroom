<svg xmlns="http://www.w3.org/2000/svg" width="200" height="160" viewBox="0 0 200 160">
  <defs>
    <linearGradient id="roomRepairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="160" fill="url(#roomRepairGrad)"/>
  
  <!-- Workbench -->
  <rect x="20" y="80" width="160" height="40" fill="#78350f" stroke="#fff" stroke-width="2" rx="2"/>
  
  <!-- Tools -->
  <!-- Screwdriver -->
  <line x1="40" y1="65" x2="40" y2="40" stroke="#fbbf24" stroke-width="4"/>
  <circle cx="40" cy="38" r="3" fill="#fbbf24"/>
  
  <!-- Wrench -->
  <line x1="70" y1="35" x2="85" y2="50" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
  <circle cx="85" cy="50" r="4" fill="#ef4444"/>
  
  <!-- Hammer -->
  <rect x="110" y="30" width="12" height="16" fill="#1e293b"/>
  <line x1="116" y1="46" x2="116" y2="70" stroke="#78350f" stroke-width="3"/>
  
  <!-- Fan (device to repair) -->
  <circle cx="150" cy="50" r="15" fill="#fbbf24" opacity="0.7" stroke="#fff" stroke-width="1"/>
  <g transform="translate(150, 50)">
    <rect x="-5" y="-10" width="10" height="8" fill="#fff" opacity="0.8" rx="1"/>
    <rect x="-8" y="-2" width="6" height="4" fill="#fff" opacity="0.8" rx="1" transform="rotate(120)"/>
    <rect x="2" y="-6" width="6" height="4" fill="#fff" opacity="0.8" rx="1" transform="rotate(240)"/>
  </g>
  
  <!-- Spare parts on workbench -->
  <circle cx="60" cy="95" r="4" fill="#fbbf24"/>
  <rect x="75" y="92" width="8" height="6" fill="#10b981"/>
  <circle cx="100" cy="98" r="3" fill="#fbbf24"/>
</svg>

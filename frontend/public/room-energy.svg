<svg xmlns="http://www.w3.org/2000/svg" width="200" height="160" viewBox="0 0 200 160">
  <defs>
    <linearGradient id="roomEnergyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="160" fill="url(#roomEnergyGrad)"/>
  
  <!-- Energy meter -->
  <rect x="30" y="20" width="140" height="70" fill="#fff" stroke="#d97706" stroke-width="2" rx="4"/>
  
  <!-- Display screen -->
  <rect x="45" y="35" width="110" height="30" fill="#1e293b" rx="2"/>
  <text x="100" y="56" font-size="18" fill="#10b981" text-anchor="middle" font-weight="bold">2.5kW</text>
  
  <!-- Indicator lights -->
  <circle cx="50" cy="75" r="4" fill="#10b981"/>
  <circle cx="70" cy="75" r="4" fill="#10b981"/>
  <circle cx="90" cy="75" r="4" fill="#fbbf24"/>
  <circle cx="110" cy="75" r="4" fill="#ef4444"/>
  <circle cx="130" cy="75" r="4" fill="#ef4444"/>
  <circle cx="150" cy="75" r="4" fill="#ef4444"/>
  
  <!-- Power distribution diagram -->
  <!-- Main input -->
  <rect x="50" y="110" width="100" height="8" fill="#d97706" stroke="#fff" stroke-width="1" rx="2"/>
  
  <!-- Distribution branches -->
  <rect x="50" y="125" width="20" height="8" fill="#10b981" stroke="#fff" stroke-width="1" rx="2"/>
  <rect x="80" y="125" width="20" height="8" fill="#10b981" stroke="#fff" stroke-width="1" rx="2"/>
  <rect x="110" y="125" width="20" height="8" fill="#fbbf24" stroke="#fff" stroke-width="1" rx="2"/>
  <rect x="140" y="125" width="10" height="8" fill="#ef4444" stroke="#fff" stroke-width="1" rx="2"/>
  
  <!-- Connection lines -->
  <line x1="60" y1="118" x2="60" y2="125" stroke="#fff" stroke-width="1"/>
  <line x1="90" y1="118" x2="90" y2="125" stroke="#fff" stroke-width="1"/>
  <line x1="120" y1="118" x2="120" y2="125" stroke="#fff" stroke-width="1"/>
  <line x1="145" y1="118" x2="145" y2="125" stroke="#fff" stroke-width="1"/>
</svg>
